# CI: typecheck + unit tests on every PR and on the two long-lived branches.
# The suite is network-free by design (providers are stubbed in tests); no
# provider key is ever configured here — a test that starts requiring one
# should fail loudly in CI rather than silently consume credits.
name: CI

on:
  pull_request:
  push:
    branches: [staging, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version pinned by package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
